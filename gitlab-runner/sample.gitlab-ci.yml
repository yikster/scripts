# =============================================================================
# sample.gitlab-ci.yml
# -----------------------------------------------------------------------------
# Reference pipeline for a private-subnet (internet-blocked) shell-executor runner.
#
# Key assumptions (important):
#   - The runner runs jobs in a non-login bash. Runtimes (node/python/mise shims)
#     are already injected via config.toml environment[] (BASH_ENV/MISE_DATA_DIR/PATH).
#     The mise activate in before_script below is only a *double safety net*; the
#     primary path is config.toml.
#   - codeartifact-login.sh is assumed installed at a fixed AMI path
#     (/usr/local/bin/codeartifact-login.sh) — not copied per repo.
#   - Multi-runtime is selected per job via `mise use node@X python@Y` or a repo-root .mise.toml.
#
# Validation points:
#   - runtime-matrix job: proves the installed node 18/20/22 + python 3.10/3.11/3.12
#     actually switch and are exposed via shims (parallel.matrix).
#   - build:app(node22/py3.12), deploy:cdk-ts-dev(node18), deploy:cdk-py-prod(node20/py3.10)
#     actually use different versions -> proves multi-runtime.
#   - cross-account: Model A (auto-assume, dev) + Model B (AWS_PROFILE, prod).
#   - CodeBuild trigger job (assume-role -> StartBuild -> poll, with a timeout guard).
# =============================================================================

variables:
  AWS_REGION: "ap-northeast-2"
  AWS_DEFAULT_REGION: "ap-northeast-2"
  # STS must use the in-VPC regional endpoint (global sts.amazonaws.com has no endpoint and hangs).
  AWS_STS_REGIONAL_ENDPOINTS: "regional"
  # CodeArtifact (owned by the runner account; same values as codeartifact-login.sh)
  CA_DOMAIN: "my-domain"
  CA_DOMAIN_OWNER: "999999999999"
  CA_NPM_REPO: "npm-store"
  CA_PYPI_REPO: "pypi-store"
  # mise shared data/config (same as the bootstrap) — for the before_script safety net.
  MISE_DATA_DIR: "/usr/local/share/mise"
  MISE_CONFIG_DIR: "/etc/mise"
  # Point the npm cache at the project directory so cache.paths' .npm/ is actually used
  # (the default npm cache is ~/.npm, making a project-relative .npm/ cache meaningless).
  npm_config_cache: "${CI_PROJECT_DIR}/.npm"
  # Prevent token log leakage — disable debug trace (NEVER set true: it exposes pip.conf/env tokens).
  CI_DEBUG_TRACE: "false"
  GIT_DEPTH: "20"

# =============================================================================
# default: shared before_script + cache for all jobs
# -----------------------------------------------------------------------------
# 1) Activate mise shims (double safety net; the primary path is config.toml environment[]).
#    MISE_DATA_DIR must be explicitly exported so shims point at the shared /usr/local/share/mise
#    (otherwise it sees the empty ~/.local/share/mise directory).
# 2) source codeartifact-login.sh to inject the token/env vars into the current shell.
#    Even if AWS_PROFILE is set as a job variable, the CA token must come from the *runner account*,
#    so source it with AWS_PROFILE emptied (the script also empties it internally — double safety).
# 3) The sourced helper does not auto-propagate failure, so verify the token/sentinel directly.
# =============================================================================
default:
  tags:
    - shell
    - cdk
  before_script:
    - export MISE_DATA_DIR="${MISE_DATA_DIR}"
    - export MISE_CONFIG_DIR="${MISE_CONFIG_DIR}"
    - eval "$(/usr/local/bin/mise activate bash --shims)"
    - 'echo "node=$(node -v 2>/dev/null || echo missing)  python=$(python -V 2>&1 || echo missing)"'
    - AWS_PROFILE="" . /usr/local/bin/codeartifact-login.sh
    - '[ -n "${CODEARTIFACT_AUTH_TOKEN:-}" ] && [ "${CA_LOGIN_OK:-0}" = "1" ] || { echo "CodeArtifact login failed"; exit 1; }'
  cache:
    key:
      files:
        - package-lock.json
        - requirements.txt
        - uv.lock
    paths:
      - node_modules/
      - .venv/
      - .npm/
      - cdk.out/

stages:
  - build
  - diff
  - deploy
  - codebuild

# =============================================================================
# runtime-matrix: prove every installed node/python version switches/exposes via shims.
# parallel.matrix runs each combination with a real `mise use` and asserts PATH exposure + version match.
# =============================================================================
runtime-matrix:
  stage: build
  parallel:
    matrix:
      - NODE_VERSION: "18"
        PYTHON_VERSION: "3.10"
      - NODE_VERSION: "20"
        PYTHON_VERSION: "3.11"
      - NODE_VERSION: "22"
        PYTHON_VERSION: "3.12"
  script:
    - mise use "node@${NODE_VERSION}" "python@${PYTHON_VERSION}"
    - 'echo "selected node=$(node -v)  python=$(python -V 2>&1)"'
    - 'node -v | grep -q "^v${NODE_VERSION}\." || { echo "node version mismatch"; exit 1; }'
    - 'python -V 2>&1 | grep -q "Python ${PYTHON_VERSION}\." || { echo "python version mismatch"; exit 1; }'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# =============================================================================
# build:app: pin node22 / python3.12; npm ci + build via CodeArtifact.
# =============================================================================
build:app:
  stage: build
  script:
    - mise use node@22 python@3.12
    - 'echo "build node=$(node -v)  python=$(python -V 2>&1)"'
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# =============================================================================
# diff:cdk-dev: TypeScript CDK synth/diff (Model A auto-assume, dev=111...).
# -----------------------------------------------------------------------------
# The cross-account context lookup is performed by assuming the *target account's*
# cdk-hnb659fds-lookup-role (not RunnerRole's ec2:Describe*). That lookup-role is
# included in the policy's AssumeRole list (region wildcard).
# cdk diff exits 0 by default even when there are changes. Do NOT swallow *all* errors with '|| true'.
# (To block the pipeline on drift, use --fail; here it is informational so unused.)
# =============================================================================
diff:cdk-dev:
  stage: diff
  variables:
    CDK_DEFAULT_ACCOUNT: "111111111111"
    CDK_DEFAULT_REGION: "ap-northeast-2"
  script:
    - mise use node@22
    - npm ci
    - npx cdk synth
    - npx cdk diff "aws://${CDK_DEFAULT_ACCOUNT}/${CDK_DEFAULT_REGION}/*"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# =============================================================================
# deploy:cdk-ts-dev: TypeScript CDK deploy (Model A auto-assume, switch to node18).
# -----------------------------------------------------------------------------
# Do not install aws-cdk globally; pin it in package.json (aws-cdk/aws-cdk-lib) and run via npx.
# =============================================================================
deploy:cdk-ts-dev:
  stage: deploy
  variables:
    CDK_DEFAULT_ACCOUNT: "111111111111"
    CDK_DEFAULT_REGION: "ap-northeast-2"
  script:
    - mise use node@18
    - 'echo "deploy node=$(node -v)"'
    - npm ci
    # one-time only (commented): bootstrap the target account (trust the runner account).
    #   npx cdk bootstrap aws://111111111111/ap-northeast-2 \
    #     --trust 999999999999 \
    #     --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess
    - npx cdk deploy --all --require-approval never
  environment:
    name: dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# =============================================================================
# deploy:cdk-py-prod: Python CDK deploy (Model B, prod=333..., switch to node20/py3.10).
# -----------------------------------------------------------------------------
# Model B explicit assume uses AWS_PROFILE=prod (the Ec2InstanceMetadata profile).
# [NOTE] If you set AWS_PROFILE as a job variable, it also affects before_script (CodeArtifact),
#        which would try to fetch the token from the prod account instead of the runner account and fail.
#        So AWS_PROFILE must be exported *inside the script only* (before_script runs as the instance role).
# [NOTE] --role-arn is NOT the CDK CLI's cross-account assume mechanism. It only sets the
#        CloudFormation *execution role*; CLI auth still uses the environment credentials
#        (=AWS_PROFILE/exported creds). Cross-account assume is done via AWS_PROFILE or
#        'aws sts assume-role' followed by env export.
# =============================================================================
deploy:cdk-py-prod:
  stage: deploy
  variables:
    CDK_DEFAULT_ACCOUNT: "333333333333"
    CDK_DEFAULT_REGION: "ap-northeast-2"
  script:
    - mise use node@20 python@3.10
    - 'echo "deploy node=$(node -v)  python=$(python -V 2>&1)"'
    - python -m venv .venv
    - . .venv/bin/activate
    - pip install -r requirements.txt
    - npm ci
    # ── cross-account starts here: export AWS_PROFILE inside the script only ──
    - export AWS_PROFILE=prod
    - 'echo "cross-account identity: $(aws sts get-caller-identity --query Arn --output text)"'
    - npx cdk deploy --all --require-approval never
    # (alternative) explicit assume without a profile:
    #   CREDS=$(aws sts assume-role --role-arn arn:aws:iam::333333333333:role/OrgDeployRole \
    #            --role-session-name "gitlab-prod-${CI_JOB_ID}" \
    #            ${EXTERNAL_ID:+--external-id "${EXTERNAL_ID}"} \
    #            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)
    #   export AWS_ACCESS_KEY_ID=$(echo "$CREDS" | cut -f1)
    #   export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | cut -f2)
    #   export AWS_SESSION_TOKEN=$(echo "$CREDS" | cut -f3)
    #   npx cdk deploy --all --require-approval never
    # (note) --role-arn is only for specifying the CFN execution role, separate from the assume above.
  environment:
    name: prod
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# =============================================================================
# codebuild:trigger: cross-account CodeBuild trigger + polling.
# -----------------------------------------------------------------------------
# Cross-account StartBuild cannot be done directly by RunnerRole, so *assume the target role first*.
# Therefore the codebuild:StartBuild permission must be on the *target account's OrgDeployRole*,
# not on RunnerRole (iam-runner-policy.json grants same-account projects only).
#
# Credential hygiene:
#   - Use the assumed credentials only inside a *subshell* () so they do not leak into the rest of the job.
#   - role-session-name is per-job unique (CI_JOB_ID) -> CloudTrail correlation.
#   - The poll loop has a max-attempt/timeout guard (avoid holding a runner slot forever; just under the 1h STS chaining cap).
#   - Validate empty/incomplete credentials before export.
# =============================================================================
codebuild:trigger:
  stage: codebuild
  variables:
    TARGET_ROLE_ARN: "arn:aws:iam::222222222222:role/OrgDeployRole"
    CODEBUILD_PROJECT: "my-deploy-project"
    CODEBUILD_REGION: "ap-northeast-2"
    POLL_MAX_ATTEMPTS: "120"   # 120 * 30s = 60-minute cap (just under the 1h STS chaining cap)
    POLL_INTERVAL_SEC: "30"
  script:
    - |
      (
        set -euo pipefail
        CREDS="$(aws sts assume-role \
          --role-arn "${TARGET_ROLE_ARN}" \
          --role-session-name "gitlab-cb-${CI_JOB_ID}" \
          ${EXTERNAL_ID:+--external-id "${EXTERNAL_ID}"} \
          --region "${AWS_REGION}" \
          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
          --output text)"
        [ -n "${CREDS}" ] && [ "$(printf '%s' "${CREDS}" | wc -w)" -eq 3 ] \
          || { echo "assume-role failed (empty/incomplete credentials)"; exit 1; }
        export AWS_ACCESS_KEY_ID="$(printf '%s' "${CREDS}" | cut -f1)"
        export AWS_SECRET_ACCESS_KEY="$(printf '%s' "${CREDS}" | cut -f2)"
        export AWS_SESSION_TOKEN="$(printf '%s' "${CREDS}" | cut -f3)"

        BUILD_ID="$(aws codebuild start-build \
          --project-name "${CODEBUILD_PROJECT}" \
          --region "${CODEBUILD_REGION}" \
          --query 'build.id' --output text)"
        echo "Started CodeBuild: ${BUILD_ID}"

        attempt=0
        while :; do
          attempt=$((attempt+1))
          STATUS="$(aws codebuild batch-get-builds --ids "${BUILD_ID}" \
            --region "${CODEBUILD_REGION}" \
            --query 'builds[0].buildStatus' --output text)"
          echo "[${attempt}/${POLL_MAX_ATTEMPTS}] CodeBuild status=${STATUS}"
          case "${STATUS}" in
            SUCCEEDED) echo "build succeeded"; break ;;
            FAILED|FAULT|STOPPED|TIMED_OUT) echo "build failed: ${STATUS}"; exit 1 ;;
          esac
          if [ "${attempt}" -ge "${POLL_MAX_ATTEMPTS}" ]; then
            echo "polling timeout (exceeded ${POLL_MAX_ATTEMPTS} attempts)"; exit 1
          fi
          sleep "${POLL_INTERVAL_SEC}"
        done
      )
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# =============================================================================
# [NOTE] Example .mise.toml to add at the consuming repo root (to pin runtimes per repo
#        instead of per-job mise use):
#   [tools]
#   node = "20"
#   python = "3.11"
# or an asdf-compatible .tool-versions:
#   node 20
#   python 3.11
#
# [NOTE] STS role-chaining cap: assuming a target role from the instance role (chaining) is
#   a *1-hour* hard cap regardless of the target's MaxSessionDuration. For long CDK deploys,
#   prefer Model A's per-operation re-assume (cdk re-assumes per call). The codebuild poll is
#   bounded by POLL_MAX_ATTEMPTS above to finish within 1h.
#
# [NOTE] 12h CodeArtifact token: before_script refreshes it per job. A single job exceeding 12h
#   must re-source codeartifact-login.sh mid-job.
# =============================================================================

# =============================================================================
# [NOTE] Required VPC endpoint service names (created via separate IaC; the script does not create them)
# -----------------------------------------------------------------------------
#   Gateway:
#     com.amazonaws.<region>.s3
#       *REQUIRED*: CDK asset/bootstrap buckets + CodeArtifact package payloads (served from an
#       AWS-owned S3 bucket) + runner cache. Not a mere cache option, but the required path for
#       CodeArtifact downloads.
#   Interface (all must have Private DNS = ENABLED; otherwise hostname resolution fails):
#     com.amazonaws.<region>.sts                       (regional, NOT global)
#     com.amazonaws.<region>.cloudformation
#     com.amazonaws.<region>.codeartifact.api
#     com.amazonaws.<region>.codeartifact.repositories
#     com.amazonaws.<region>.ecr.api
#     com.amazonaws.<region>.ecr.dkr
#     com.amazonaws.<region>.logs
#     com.amazonaws.<region>.kms
#     com.amazonaws.<region>.ssm
#     com.amazonaws.<region>.ssmmessages
#     com.amazonaws.<region>.ec2messages
#     com.amazonaws.<region>.codebuild
#   (optional) com.amazonaws.<region>.secretsmanager / .ec2 / .dynamodb(Gateway)
# =============================================================================
